name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP syntax check
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/*.php)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files found"
            exit 1
          fi
          for f in "${files[@]}"; do
            php -l "$f" >/dev/null
          done
          echo "PHP syntax OK (${#files[@]} files)"

      - name: Smoke tests — monthly total (US-08)
        run: php scripts/ci-smoke-test.php

  deploy:
    name: Deploy to Hostinger
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: hostinger-production

    steps:
      - name: Verify FTP secrets are configured
        shell: bash
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          missing=0
          for key in FTP_SERVER FTP_USERNAME FTP_PASSWORD FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              echo "::error title=Missing secret::$key is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "CI/CD deploy requires four secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_REMOTE_DIR"
            echo "See DEPLOY.md section 7 for Hostinger setup steps."
            exit 1
          fi
          echo "All FTP secrets present."

      - uses: actions/checkout@v6

      - name: Sync files to Hostinger (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          log-level: standard
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/.env.*
            **/node_modules/**
            **/storage/sessions/*
            !**/storage/sessions/.gitkeep
            **/storage/logs/**
            **/*.sql
            **/DEPLOY.md
            **/Dockerfile
            **/render.yaml
            **/.gitignore
            **/composer.phar
            **/scripts/**

      - name: Deploy complete
        run: echo "Live site updated. Hard refresh the browser (Ctrl+F5) to see changes."
